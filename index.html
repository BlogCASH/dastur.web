<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Bio Generator | Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            --primary: #833ab4;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text: #333;
            --border: #e8e8e8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: var(--bg-gradient);
            transition: background 0.5s ease;
            color: var(--text);
            padding: 20px;
        }

        .hidden { display: none !important; }
        
        header {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1200px; margin: 0 auto 20px; padding: 15px 20px;
            background: var(--card-bg); border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .logo { font-size: 20px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .icon-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; border-radius: 8px; transition: 0.3s; }
        .icon-btn:hover { background: rgba(0,0,0,0.05); }

        #authButtons button, #userMenu button {
            padding: 8px 14px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s;
            background: var(--primary); color: #fff; font-size: 14px;
        }
        #authButtons button:hover, #userMenu button:hover { opacity: 0.9; transform: translateY(-1px); }

        .theme-picker {
            position: fixed; top: 70px; right: 20px;
            background: var(--card-bg); padding: 15px; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 100;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            animation: fadeIn 0.3s ease;
        }
        .color-option {
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: 0.3s;
        }
        .color-option:hover { transform: scale(1.1); border-color: #fff; }

        .section { max-width: 520px; margin: 40px auto; animation: fadeIn 0.4s ease; }
        .container {
            background: var(--card-bg); border-radius: 24px; padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        }

        .auth-container { text-align: center; }
        .auth-container h2 { margin-bottom: 20px; color: var(--primary); }
        .auth-container input {
            width: 100%; padding: 14px; margin-bottom: 12px; border: 2px solid var(--border);
            border-radius: 12px; font-size: 15px; transition: 0.3s;
        }
        .auth-container input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(131,58,180,0.1); }
        .auth-container button {
            width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #fd1d1d); color: #fff;
            font-weight: 700; cursor: pointer; font-size: 15px; transition: 0.3s;
        }
        .auth-container button:hover { transform: translateY(-2px); }
        .auth-container a { color: var(--primary); font-weight: 600; text-decoration: none; cursor: pointer; }
        .admin-hint { font-size: 12px; color: #666; background: #f0f0f0; padding: 8px; border-radius: 8px; margin-top: 15px; }

        .form-group { margin-top: 24px; }
        .form-group label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 12px;
            font-size: 14px; transition: 0.3s; background: #fafafa;
        }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .form-group textarea { resize: vertical; min-height: 80px; font-family: inherit; }

        .tone-selector { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
        .tone-option {
            padding: 8px 14px; border: 2px solid var(--border); border-radius: 50px;
            cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.3s; background: #fafafa;
        }
        .tone-option.active { background: var(--primary); color: #fff; border-color: transparent; }

        .generate-btn {
            width: 100%; padding: 14px; margin-top: 24px; border: none; border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #fd1d1d, #fcb045);
            color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .generate-btn:hover { transform: translateY(-2px); }

        .results { margin-top: 24px; }
        .bio-card {
            background: #f8f8f8; border: 2px solid #eee; border-radius: 14px; padding: 18px;
            margin-bottom: 10px; position: relative; transition: 0.3s;
        }
        .bio-card:hover { border-color: var(--primary); }
        .bio-text { font-size: 14px; line-height: 1.6; white-space: pre-line; }
        .copy-btn {
            position: absolute; top: 10px; right: 10px; padding: 5px 12px;
            border: 2px solid var(--primary); border-radius: 50px; background: #fff;
            color: var(--primary); font-size: 11px; font-weight: 600; cursor: pointer;
        }
        .copy-btn.copied { background: #4CAF50; border-color: #4CAF50; color: #fff; }
        .char-count { font-size: 11px; color: #888; margin-top: 6px; text-align: right; }
        .char-count.limit { color: #e74c3c; font-weight: 600; }

        .table-wrapper { overflow-x: auto; margin: 20px 0; border-radius: 12px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        th { background: #f5f5f5; font-weight: 700; color: var(--primary); }
        .admin-btn { background: #2d3436; }
        .admin-btn:hover { background: #111; }
        .logout-btn { background: #e74c3c; }
        .logout-btn:hover { background: #c0392b; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 600px) {
            header { flex-direction: column; gap: 10px; text-align: center; }
            .container { padding: 20px; }
            .theme-picker { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">📸 IG Bio Generator</div>
    <div class="header-controls">
        <button id="themeBtn" class="icon-btn" title="Orqa fon rangi">🎨</button>
        <div id="authButtons">
            <button onclick="showAuth('login')">Kirish</button>
            <button onclick="showAuth('register')">Ro'yxatdan o'tish</button>
        </div>
        <div id="userMenu" class="hidden">
            <span id="userNameDisplay" style="font-weight:600; font-size:14px;"></span>
            <button id="adminBtn" class="hidden admin-btn" onclick="showAdmin()">👥 Admin</button>
            <button class="logout-btn" onclick="logout()">Chiqish</button>
        </div>
    </div>
</header>

<div id="themePicker" class="theme-picker hidden">
    <div class="color-option" style="background:linear-gradient(135deg,#833ab4,#fd1d1d,#fcb045)" data-theme="instagram"></div>
    <div class="color-option" style="background:linear-gradient(135deg,#11998e,#38ef7d)" data-theme="nature"></div>
    <div class="color-option" style="background:linear-gradient(135deg,#000428,#004e92)" data-theme="dark"></div>
    <div class="color-option" style="background:linear-gradient(135deg,#ff9a9e,#fecfef)" data-theme="pink"></div>
    <div class="color-option" style="background:linear-gradient(135deg,#2b5876,#4e4376)" data-theme="deep"></div>
    <div class="color-option" style="background:linear-gradient(135deg,#f5f7fa,#c3cfe2)" data-theme="light"></div>
</div>

<section id="authSection" class="section">
    <div class="container auth-container">
        <h2 id="authTitle">Kirish</h2>
        <form id="authForm">
            <input type="text" id="authName" placeholder="Ismingiz" style="display:none;">
            <input type="text" id="authEmail" placeholder="Email yoki 'admin' (admin kirish uchun)" required>
            <input type="password" id="authPassword" placeholder="Parol" required>
            <button type="submit" id="authSubmitBtn">Kirish</button>
        </form>
        <p id="authSwitch" style="margin-top:15px; font-size:14px;">Hisobingiz yo'qmi? <a onclick="toggleAuthMode()">Ro'yxatdan o'ting</a></p>
        <div class="admin-hint">🔐 Admin kirish uchun: Login: <b>admin</b> | Parol: <b>admin123</b></div>
        <p id="authMsg" style="margin-top:10px; color:#e74c3c; font-size:13px; min-height:20px;"></p>
    </div>
</section>

<section id="appSection" class="section hidden">
    <div class="container">
        <div class="form-group">
            <label>💼 Kasbingiz / Sohangiz</label>
            <input type="text" id="profession" placeholder="Masalan: Fotograf, Dasturchi, Fitness murabbiy...">
        </div>
        <div class="form-group">
            <label>🎯 Obunachilaringizga nima berasiz?</label>
            <textarea id="value" placeholder="Masalan: Go'zal suratlar olish sirlari, dasturlash bo'yicha maslahatlar..."></textarea>
        </div>
        <div class="form-group">
            <label>🎨 Bio uslubini tanlang</label>
            <div class="tone-selector">
                <div class="tone-option active" data-tone="professional">💼 Professional</div>
                <div class="tone-option" data-tone="creative">🎨 Kreativ</div>
                <div class="tone-option" data-tone="fun">😄 Qiziqarli</div>
                <div class="tone-option" data-tone="minimal">✨ Minimal</div>
            </div>
        </div>
        <button class="generate-btn" onclick="generateBio()">⚡ Bio Yaratish</button>
        <div id="results" class="results"></div>
    </div>
</section>

<section id="adminSection" class="section hidden">
    <div class="container">
        <h2>👥 Ro'yxatdan o'tgan foydalanuvchilar</h2>
        <p style="margin-bottom:15px; font-size:13px; color:#666;">Jami: <span id="userCount">0</span> kishi</p>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>Ism</th><th>Email</th><th>Sana</th><th>Rol</th></tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr><td colspan="4" style="text-align:center; padding:20px;">Ma'lumot topilmadi</td></tr>
                </tbody>
            </table>
        </div>
        <button onclick="showApp()">← Ortga qaytish</button>
    </div>
</section>

<script>
    // ================= SOZLAMALAR =================
    // ⚠️ Admin login va parolini shu yerdan o'zgartirishingiz mumkin
    const ADMIN_LOGIN = 'admin';
    const ADMIN_PASSWORD = 'admin123'; 

    const USERS_KEY = 'igbio_users';
    const SESSION_KEY = 'igbio_session';
    const THEME_KEY = 'igbio_theme';

    function getUsers() { return JSON.parse(localStorage.getItem(USERS_KEY)) || []; }
    function saveUsers(users) { localStorage.setItem(USERS_KEY, JSON.stringify(users)); }
    function getCurrentUser() { return JSON.parse(localStorage.getItem(SESSION_KEY)); }
    function setCurrentUser(user) { localStorage.setItem(SESSION_KEY, JSON.stringify(user)); }
    function clearSession() { localStorage.removeItem(SESSION_KEY); }

    // ================= AUTH =================
    let authMode = 'login';

    function showAuth(mode) {
        authMode = mode;
        document.getElementById('authSection').classList.remove('hidden');
        document.getElementById('appSection').classList.add('hidden');
        document.getElementById('adminSection').classList.add('hidden');
        updateAuthUI();
    }

    function toggleAuthMode() {
        authMode = authMode === 'login' ? 'register' : 'login';
        updateAuthUI();
        document.getElementById('authMsg').textContent = '';
    }

    function updateAuthUI() {
        document.getElementById('authTitle').textContent = authMode === 'login' ? 'Kirish' : "Ro'yxatdan o'tish";
        document.getElementById('authName').style.display = authMode === 'register' ? 'block' : 'none';
        document.getElementById('authSubmitBtn').textContent = authMode === 'login' ? 'Kirish' : "Ro'yxatdan o'tish";
        document.getElementById('authSwitch').innerHTML = authMode === 'login' 
            ? 'Hisobingiz yo\'qmi? <a onclick="toggleAuthMode()">Ro\'yxatdan o\'ting</a>' 
            : 'Hisobingiz bormi? <a onclick="toggleAuthMode()">Kirish</a>';
        document.getElementById('authEmail').value = '';
        document.getElementById('authPassword').value = '';
        document.getElementById('authMsg').textContent = '';
    }

    document.getElementById('authForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('authName').value.trim();
        const email = document.getElementById('authEmail').value.trim().toLowerCase();
        const pass = document.getElementById('authPassword').value.trim();
        const msg = document.getElementById('authMsg');

        if (!email || !pass) { msg.textContent = "⚠️ Barcha maydonlarni to'ldiring!"; return; }

        // ADMIN KIRISH TEKSHIRUVI
        if (authMode === 'login') {
            if (email === ADMIN_LOGIN && pass === ADMIN_PASSWORD) {
                setCurrentUser({ name: 'Admin', email: ADMIN_LOGIN, role: 'admin' });
                initApp();
                return;
            }
        }

        const users = getUsers();

        if (authMode === 'register') {
            if (!name) { msg.textContent = "⚠️ Ismingizni kiriting!"; return; }
            if (users.find(u => u.email === email)) {
                msg.textContent = "⚠️ Bu email allaqachon ro'yxatdan o'tgan!"; return;
            }
            // Hamma oddiy foydalanuvchi bo'lib ro'yxatdan o'tadi
            const newUser = {
                id: Date.now(),
                name: name,
                email: email,
                password: pass,
                role: 'user',
                date: new Date().toLocaleString('uz-UZ')
            };
            users.push(newUser);
            saveUsers(users);
            setCurrentUser({ name: newUser.name, email: newUser.email, role: 'user' });
            msg.style.color = '#27ae60';
            msg.textContent = "✅ Muvaffaqiyatli ro'yxatdan o'tdingiz!";
            setTimeout(() => initApp(), 800);
        } else {
            // ODDIY FOYDALANUVCHI KIRISHI
            const user = users.find(u => u.email === email && u.password === pass);
            if (!user) { msg.style.color = '#e74c3c'; msg.textContent = "❌ Email yoki parol noto'g'ri!"; return; }
            setCurrentUser({ name: user.name, email: user.email, role: user.role });
            initApp();
        }
    });

    function logout() {
        clearSession();
        document.getElementById('authButtons').classList.remove('hidden');
        document.getElementById('userMenu').classList.add('hidden');
        showAuth('login');
    }

    // ================= THEME =================
    const themes = {
        instagram: 'linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045)',
        nature: 'linear-gradient(135deg, #11998e, #38ef7d)',
        dark: 'linear-gradient(135deg, #000428, #004e92)',
        pink: 'linear-gradient(135deg, #ff9a9e, #fecfef)',
        deep: 'linear-gradient(135deg, #2b5876, #4e4376)',
        light: 'linear-gradient(135deg, #f5f7fa, #c3cfe2)'
    };

    function setTheme(key) {
        document.documentElement.style.setProperty('--bg-gradient', themes[key]);
        localStorage.setItem(THEME_KEY, key);
    }

    function loadTheme() {
        const saved = localStorage.getItem(THEME_KEY) || 'instagram';
        setTheme(saved);
    }

    document.getElementById('themeBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('themePicker').classList.toggle('hidden');
    });

    document.querySelectorAll('.color-option').forEach(opt => {
        opt.addEventListener('click', () => setTheme(opt.dataset.theme));
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('#themePicker') && !e.target.closest('#themeBtn')) {
            document.getElementById('themePicker').classList.add('hidden');
        }
    });

    // ================= APP NAV & INIT =================
    function initApp() {
        const user = getCurrentUser();
        if (!user) return showAuth('login');

        document.getElementById('authButtons').classList.add('hidden');
        document.getElementById('userMenu').classList.remove('hidden');
        document.getElementById('userNameDisplay').textContent = `👤 ${user.name}`;
        
        // Faqat admin ko'rsin
        if (user.role === 'admin') {
            document.getElementById('adminBtn').classList.remove('hidden');
        } else {
            document.getElementById('adminBtn').classList.add('hidden');
        }

        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('appSection').classList.remove('hidden');
        document.getElementById('adminSection').classList.add('hidden');
    }

    function showApp() {
        document.getElementById('appSection').classList.remove('hidden');
        document.getElementById('adminSection').classList.add('hidden');
    }

    function showAdmin() {
        const user = getCurrentUser();
        if (!user || user.role !== 'admin') return alert("⛔ Faqat admin ko'rishi mumkin!");

        const users = getUsers();
        document.getElementById('userCount').textContent = users.length;
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';

        if (users.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Hali hech kim ro\'yxatdan o\'tmagan</td></tr>';
        } else {
            users.forEach(u => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${u.name}</td><td>${u.email}</td><td>${u.date}</td><td><span style="color:#555; font-weight:600">${u.role.toUpperCase()}</span></td>`;
                tbody.appendChild(tr);
            });
        }

        document.getElementById('appSection').classList.add('hidden');
        document.getElementById('adminSection').classList.remove('hidden');
    }

    // ================= BIO GENERATOR =================
    document.querySelectorAll('.tone-option').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.tone-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
        });
    });

    function getActiveTone() {
        return document.querySelector('.tone-option.active')?.dataset.tone || 'professional';
    }

    function generateBio() {
        const prof = document.getElementById('profession').value.trim();
        const val = document.getElementById('value').value.trim();
        const tone = getActiveTone();

        if (!prof || !val) return alert("⚠️ Kasb va qiymat maydonlarini to'ldiring!");

        const bios = createBios(prof, val, tone);
        displayBios(bios);
    }

    function createBios(p, v, tone) {
        if (tone === 'professional') return [
            `👤 ${p}\n🎯 ${v}\n📩 Bog'lanish: DM\n🔗 Pastdagi havoladan foydalaning`,
            `✅ Professional ${p.toLowerCase()}\n📌 ${v}\n🌟 Sifat va ishonch\n📲 Hamkorlik uchun yozing`
        ];
        if (tone === 'creative') return [
            `🎨 ${p} — san'atkor\n💫 ${v}\n🌈 Har bir post — yangi dunyo\n👇 Kuzating`,
            `✨ ${p} | Kreativ yondashuv\n💎 ${v}\n🚀 Cheksiz ilhom manbai\n🔗 Link quyida`
        ];
        if (tone === 'fun') return [
            `😎 ${p} — lekin zerikarli emas!\n🎉 ${v}\n☕ Kofe bilan ishlayman\n👇 Kuzat, pushaymon bo'lmaysan`,
            `🤩 ${p} va boshqa ajoyib narsalar\n💪 ${v}\n😂 Ba'zan hazil, har doim foyda\n📲 Qo'shil!`
        ];
        return [
            `${p}.\n${v}.\nBog'lanish: DM`,
            `▫️ ${p}\n▫️ ${v}\n👇`
        ];
    }

    function displayBios(bios) {
        const container = document.getElementById('results');
        container.innerHTML = '<h3 style="margin-bottom:15px; font-size:16px;">✨ Tayyor Bio Variantlar</h3>';

        bios.forEach((bio, i) => {
            const chars = bio.length;
            const card = document.createElement('div');
            card.className = 'bio-card';
            card.style.animationDelay = `${i*0.1}s`;
            card.innerHTML = `
                <div class="bio-text">${bio}</div>
                <div class="char-count ${chars>150?'limit':''}">${chars} / 150 belgi ${chars>150?'⚠️':'✅'}</div>
                <button class="copy-btn" onclick="copyBio(this)">📋 Nusxa</button>
            `;
            card.dataset.bio = bio;
            container.appendChild(card);
        });
        container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function copyBio(btn) {
        const card = btn.closest('.bio-card');
        const text = card.dataset.bio;
        navigator.clipboard.writeText(text).then(() => {
            btn.textContent = '✅ Nusxalandi!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '📋 Nusxa';
                btn.classList.remove('copied');
            }, 2000);
        });
    }

    // ================= INIT =================
    window.addEventListener('load', () => {
        loadTheme();
        initApp();
    });
</script>

</body>
</html>
